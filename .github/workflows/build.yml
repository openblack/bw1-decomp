name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    # This is a *private* build container.
    # See docs/github_actions.md for more information.
    container: ghcr.io/openblack/bw1-build:main

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [BW1W100, BW1W110, BW1W120]

    steps:
    # Checkout the repository
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    # Set Git config
    - name: Git config
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

    # Normalize file mod times
    - name: Restore timestamps
      run: |
        uv run https://raw.githubusercontent.com/MestreLion/git-tools/refs/tags/v2022.12/git-restore-mtime \
            --merge --commit-time

    # Copy the original files to the workspace
    - name: Prepare
      run: cp -a /orig .

    # Restore cached files
    - name: Cache build
      uses: actions/cache@v4
      with:
        path: |
          build
          .ninja_deps
          .ninja_log
        key: ${{ runner.os }}-${{ matrix.version }}-${{ github.sha }}
        restore-keys: ${{ runner.os }}-${{ matrix.version }}-

    # Build wibo from main and use it as the compiler wrapper. The pinned
    # release (1.1.0) doesn't implement kernel32!lstrcpynA, which cl.exe calls
    # when compiling any translation unit that includes <windows.h>; the
    # implementation only exists on wibo main.
    - name: Build wibo
      run: |
        apt-get update
        apt-get install -y --no-install-recommends \
            build-essential cmake clang libclang-dev python3-venv
        git clone --depth 1 https://github.com/decompals/wibo.git /tmp/wibo
        cd /tmp/wibo
        cmake --preset release64
        cmake --build build/release64 -j

    # Build the project. Static libs ship in the build container under
    # orig/libs (copied above via /orig), where configure.py reads them
    # verbatim. --wrapper points at the wibo built above so it overrides the
    # downloaded 1.1.0.
    - name: Build
      run: |
        python configure.py --map --version ${{ matrix.version }} \
            --wrapper /tmp/wibo/build/release64/wibo
        ninja all_source progress build/${{ matrix.version }}/report.json

    # Upload map files
    - name: Upload map
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.version }}_maps
        path: build/${{ matrix.version }}/**/*.map

    # Upload progress report
    - name: Upload report
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.version }}_report
        path: build/${{ matrix.version }}/report.json
